name: Maven CI
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
env:
  MAVEN_OPTS: "-Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
  APP_NAME: "my-java-app"
  APP_VERSION: "1.0.0"
  DEPLOY_ENV: "production"
  MAVEN_VERSION: "3.9.6"
  JAVA_VERSION: "11"
jobs:
  build:
    name: Build
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Install Maven ${{ env.MAVEN_VERSION }}
        run: |
          if ! command -v mvn &> /dev/null || ! mvn --version | grep -q "${{ env.MAVEN_VERSION }}"; then
            curl -fsSL https://archive.apache.org/dist/maven/maven-3/${{ env.MAVEN_VERSION }}/binaries/apache-maven-${{ env.MAVEN_VERSION }}-bin.tar.gz -o /tmp/maven.tar.gz
            sudo tar -xzf /tmp/maven.tar.gz -C /opt
            sudo ln -sf /opt/apache-maven-${{ env.MAVEN_VERSION }}/bin/mvn /usr/local/bin/mvn
          fi
          mvn --version
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: .m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build-specific setup
        run: |
          echo "Default base before_script running..."
          echo "Build-specific setup..."
          mkdir -p target
          echo "Setting Java memory options..."
          echo "JAVA_OPTS=-Xmx1024m -Xms512m" >> $GITHUB_ENV
      - name: Build with Maven
        env:
          BUILD_TYPE: release
        run: |
          echo "Building ${{ env.APP_NAME }} version ${{ env.APP_VERSION }}"
          mvn ${{ env.MAVEN_CLI_OPTS }} clean package
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifacts
          path: target/*.jar
          retention-days: 1
  publish:
    name: Publish
    runs-on: [self-hosted, linux]
    needs: build
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Install Maven ${{ env.MAVEN_VERSION }} and jq
        run: |
          if ! command -v mvn &> /dev/null || ! mvn --version | grep -q "${{ env.MAVEN_VERSION }}"; then
            curl -fsSL https://archive.apache.org/dist/maven/maven-3/${{ env.MAVEN_VERSION }}/binaries/apache-maven-${{ env.MAVEN_VERSION }}-bin.tar.gz -o /tmp/maven.tar.gz
            sudo tar -xzf /tmp/maven.tar.gz -C /opt
            sudo ln -sf /opt/apache-maven-${{ env.MAVEN_VERSION }}/bin/mvn /usr/local/bin/mvn
          fi
          if ! command -v jq &> /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          fi
          mvn --version && jq --version
      - name: Publish-specific setup
        run: |
          echo "Default base before_script running..."
          echo "Publish-specific setup..."
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-artifacts
          path: target
      - name: List artifacts
        run: ls -lh target/*.jar
      - name: Publish artifact
        env:
          PUBLISH_TARGET: nexus-repository
        run: |
          echo "Publishing ${{ env.APP_NAME }} to ${{ env.DEPLOY_ENV }} environment"
          echo "Artifact $(ls target/*.jar)"
